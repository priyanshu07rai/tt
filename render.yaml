services:
  # Backend Web Service
  - type: web
    name: time-manager-backend
    env: python
    buildCommand: "./backend-drf/build.sh"
    startCommand: "cd backend-drf && gunicorn time_manager_main.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: time-manager-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://task-manager-with-pomodoro-timer-1.onrender.com"
      - key: RENDER_EXTERNAL_HOSTNAME
        sync: false

  # Frontend Static Site
  - type: web
    name: time-manager-frontend
    env: static
    buildCommand: "cd frontend-react && npm install && npm run build"
    staticPublishPath: "./frontend-react/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://task-manager-with-pomodoro-timer.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: time-manager-db
    databaseName: time_manager
    user: time_manager_user
